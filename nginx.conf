server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Larger buffers for API JSON payloads
    client_max_body_size 25m;

    # FastAPI backend — uvicorn on 127.0.0.1:3000 (managed by supervisord)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # tRPC (not used by FastAPI, but present per template contract)
    location /trpc/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed static assets — 404 if missing (never fall through to index.html)
    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|map|webp)$ {
        try_files $uri =404;
    }

    # SPA fallback — react-router BrowserRouter deep links
    location / {
        try_files $uri $uri/ /index.html;
    }
}
